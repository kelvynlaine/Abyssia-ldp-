<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Email confirmé — Abyss IA</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 60%, #020617 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 40px 28px;
      text-align: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    .badge {
      width: 84px;
      height: 84px;
      margin: 0 auto 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.45);
    }
    .badge svg { width: 44px; height: 44px; }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.78);
      margin: 0 0 24px;
    }
    .hint {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin: 0;
    }
    .error h1 { color: #fca5a5; }
  </style>
</head>
<body>
  <main class="card" id="card">
    <div class="badge" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 id="title">Email confirmé !</h1>
    <p id="message">
      Votre adresse email a bien été vérifiée. Vous pouvez maintenant retourner
      dans l'application <strong>Abyss IA</strong> et vous connecter avec vos
      identifiants.
    </p>
    <p class="hint">Vous pouvez fermer cette page en toute sécurité.</p>
  </main>

  <script>
    // Supabase ajoute parfois ?error=... ou #error=... si le lien est invalide
    // ou expiré. On affiche alors un message clair plutôt qu'une page "OK".
    (function () {
      var params = new URLSearchParams(window.location.search);
      var hash = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      var error = params.get('error') || hash.get('error') ||
        params.get('error_description') || hash.get('error_description');

      if (error) {
        var card = document.getElementById('card');
        var title = document.getElementById('title');
        var message = document.getElementById('message');
        card.classList.add('error');
        title.textContent = 'Lien invalide ou expiré';
        message.innerHTML =
          "Ce lien de confirmation n'est plus valide. Ouvrez l'application " +
          "<strong>Abyss IA</strong> et demandez un nouvel email de confirmation.";
      }
    })();
  </script>
</body>
</html>
